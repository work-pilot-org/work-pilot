services:



  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile

    container_name: workpilot_auth_service

    restart: unless-stopped



    env_file:
      - ./auth-service/.env

    ports:
      - "8001:8000"

    volumes:
      - ./auth-service:/app
      - /app/.venv

    working_dir: /app

    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  hr-service:
    build:
      context: ./hr-service
      dockerfile: Dockerfile
    container_name: workpilot_hr_service
    restart: unless-stopped

    env_file:
      - ./hr-service/.env
    ports:
      - "8002:8000"
    volumes:
      - ./hr-service:/app
      - /app/.venv
    working_dir: /app
    command: >
      sh -c "uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  it-service:
    build:
      context: ./it-service
      dockerfile: Dockerfile
    container_name: workpilot_it_service
    restart: unless-stopped

    env_file:
      - ./it-service/.env
    ports:
      - "8004:8000"
    volumes:
      - ./it-service:/app
      - /app/.venv
    working_dir: /app
    command: >
      sh -c "uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  workflow-service:
    build:
      context: ./workflow-service
      dockerfile: Dockerfile
    container_name: workpilot_workflow_service
    restart: unless-stopped

    env_file:
      - ./workflow-service/.env
    ports:
      - "8005:8000"
    volumes:
      - ./workflow-service:/app
      - /app/.venv
    working_dir: /app
    command: >
      sh -c "uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workpilot_frontend
    restart: unless-stopped
    depends_on:
      - auth-service
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://localhost:8001
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
