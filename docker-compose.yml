services:

  postgres:
    image: postgres:16

    container_name: workpilot_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: workpilot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workpilot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile

    container_name: workpilot_auth_service

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./auth-service/.env

    ports:
      - "8000:8000"

    volumes:
      - ./auth-service:/app
      - /app/.venv

    working_dir: /app

    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workpilot_frontend
    restart: unless-stopped
    depends_on:
      - auth-service
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev

volumes:
  postgres_data: